  const links = [['Início','hero'],['Menu','menu'],['A Nossa História','about'],['Localização','location']];

                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <button onClick={() => onUpdate(item.id, item.qty - 1)} style={{ width: 28, height: 28, borderRadius: '50%', border: '1px solid #E5E0D5', background: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'DM Sans', fontSize: 18, lineHeight: 1, color: '#555' }}>−</button>
                  <span style={{ fontFamily: 'DM Sans', fontWeight: 600, minWidth: 20, textAlign: 'center', fontSize: 14 }}>{item.qty}</span>
                  <button onClick={() => onUpdate(item.id, item.qty + 1)} style={{ width: 28, height: 28, borderRadius: '50%', border: 'none', background: '#C8202F', color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'DM Sans', fontSize: 18, lineHeight: 1 }}>+</button>
                </div>
                <div style={{ fontFamily: 'DM Sans', fontWeight: 600, fontSize: 14, minWidth: 52, textAlign: 'right' }}>€{(item.price * item.qty).toFixed(2)}</div>
              </div>
            )) : (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 18, paddingTop: 4 }}>
                <div>
                  <label style={{ fontFamily: 'DM Sans', fontSize: 11, letterSpacing: '0.14em', textTransform: 'uppercase', color: '#888', display: 'block', marginBottom: 8 }}>Nome *</label>
                  <input value={name} onChange={e => setName(e.target.value)} placeholder="O teu nome completo" style={{ width: '100%', padding: '12px 14px', border: '1px solid #E5E0D5', borderRadius: 7, fontFamily: 'DM Sans', fontSize: 14, outline: 'none', background: 'white' }} />
                </div>
                <div>
                  <label style={{ fontFamily: 'DM Sans', fontSize: 11, letterSpacing: '0.14em', textTransform: 'uppercase', color: '#888', display: 'block', marginBottom: 8 }}>Tipo de pedido</label>
                  <div style={{ display: 'flex', gap: 8 }}>
                    {[['entrega','Entrega'],['levantamento','Levantamento']].map(([v, l]) => (
                      <button key={v} onClick={() => setMode(v)} style={{ flex: 1, padding: '10px', borderRadius: 7, border: '1px solid ' + (mode === v ? '#C8202F' : '#E5E0D5'), background: mode === v ? '#FDEAEC' : 'white', color: mode === v ? '#C8202F' : '#888', fontFamily: 'DM Sans', fontSize: 13, fontWeight: mode === v ? 600 : 400 }}>{l}</button>
                    ))}
                  </div>
                </div>
                {mode === 'entrega' && (
                  <div>
                    <label style={{ fontFamily: 'DM Sans', fontSize: 11, letterSpacing: '0.14em', textTransform: 'uppercase', color: '#888', display: 'block', marginBottom: 8 }}>Morada de entrega *</label>
                    <input value={addr} onChange={e => setAddr(e.target.value)} placeholder="Rua, número, localidade" style={{ width: '100%', padding: '12px 14px', border: '1px solid #E5E0D5', borderRadius: 7, fontFamily: 'DM Sans', fontSize: 14, outline: 'none', background: 'white' }} />
                  </div>
                )}
                <div style={{ background: '#F5F0E6', borderRadius: 7, padding: '12px 14px', fontFamily: 'DM Sans', fontSize: 12, color: '#999', lineHeight: 1.65 }}>
                  Ao confirmar, serás redirecionado para o WhatsApp para finalizar o teu pedido.
                </div>
              </div>
            )}
          </div>
        )}

        {/* Footer */}
        {items.length > 0 && (
          <div style={{ padding: '20px 28px', borderTop: '1px solid #EDE9DF', background: 'white', flexShrink: 0 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 16 }}>
              <span style={{ fontFamily: 'DM Sans', fontSize: 13, color: '#999' }}>Total do pedido</span>
              <span style={{ fontFamily: 'Cormorant Garamond', fontSize: 28, fontWeight: 600 }}>€{total.toFixed(2)}</span>
            </div>
            {step === 'cart' ? (
              <button onClick={() => setStep('details')} style={{ width: '100%', padding: 15, background: '#C8202F', color: 'white', border: 'none', borderRadius: 8, fontFamily: 'DM Sans', fontSize: 14, fontWeight: 600, letterSpacing: '0.04em' }}>
                Avançar para a encomenda →
              </button>
            ) : (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                <button onClick={send} disabled={!canSend} style={{ width: '100%', padding: 15, background: canSend ? '#25D366' : '#ccc', color: 'white', border: 'none', borderRadius: 8, fontFamily: 'DM Sans', fontSize: 14, fontWeight: 600, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, cursor: canSend ? 'pointer' : 'not-allowed' }}>
                  <IcoWA size={17} /> Confirmar via WhatsApp
                </button>
                <button onClick={() => setStep('cart')} style={{ background: 'none', border: '1px solid #E5E0D5', borderRadius: 8, padding: 11, fontFamily: 'DM Sans', fontSize: 13, color: '#888' }}>← Voltar ao carrinho</button>
              </div>
            )}
          </div>
        )}
      </div>
    </>
  );
}

/* ── APP ── */
function App() {
  const [cart, setCart] = useState(() => {
    try { return JSON.parse(localStorage.getItem('vieri-cart') || '[]'); } catch { return []; }
  });
  const [cartOpen, setCartOpen] = useState(false);

  useEffect(() => {
    try { localStorage.setItem('vieri-cart', JSON.stringify(cart)); } catch {}
  }, [cart]);

  useEffect(() => {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); obs.unobserve(e.target); } });
    }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
    setTimeout(() => {
      document.querySelectorAll('.fade-in').forEach(el => obs.observe(el));
    }, 100);
    return () => obs.disconnect();
  }, []);

  const addToCart = (item) => {
    setCart(prev => {
      const ex = prev.find(i => i.id === item.id);
      if (ex) return prev.map(i => i.id === item.id ? { ...i, qty: i.qty + 1 } : i);
      return [...prev, { ...item, qty: 1 }];
    });
    setCartOpen(true);
  };

  const updateCart = (id, qty) => {
    if (qty <= 0) setCart(prev => prev.filter(i => i.id !== id));
    else setCart(prev => prev.map(i => i.id === id ? { ...i, qty } : i));
  };

  const cartCount = cart.reduce((s, i) => s + i.qty, 0);

  return (
    <div>
      <Nav cartCount={cartCount} onCart={() => setCartOpen(true)} />
      <Hero onMenu={() => goTo('menu')} />
      <FeaturesBar />
      <MenuSection onAdd={addToCart} />
      <About />
      <Location />
      <Footer />

      {cartOpen && <CartDrawer items={cart} onClose={() => setCartOpen(false)} onUpdate={updateCart} />}

      {/* WhatsApp FAB */}
      <a href={`https://wa.me/${V.whatsapp}`} target="_blank" style={{ position: 'fixed', bottom: 28, right: 28, zIndex: 900, width: 54, height: 54, borderRadius: '50%', background: '#25D366', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 4px 20px rgba(37,211,102,0.42)', color: 'white', transition: 'transform 0.2s, box-shadow 0.2s' }}
        onMouseEnter={e => { e.currentTarget.style.transform = 'scale(1.1)'; e.currentTarget.style.boxShadow = '0 8px 32px rgba(37,211,102,0.55)'; }}
        onMouseLeave={e => { e.currentTarget.style.transform = 'scale(1)'; e.currentTarget.style.boxShadow = '0 4px 20px rgba(37,211,102,0.42)'; }}>
        <IcoWA size={26} />
      </a>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
